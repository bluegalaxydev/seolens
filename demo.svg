<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1020" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Code', Consolas, monospace" font-size="14">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Terminal window background -->
  <rect x="20" y="20" width="1060" height="980" rx="10" ry="10" fill="#1a1a1a" filter="url(#shadow)"/>

  <!-- macOS title bar -->
  <rect x="20" y="20" width="1060" height="36" rx="10" ry="10" fill="#2d2d2d"/>
  <rect x="20" y="46" width="1060" height="10" fill="#2d2d2d"/>

  <!-- Traffic light dots -->
  <circle cx="42" cy="38" r="6" fill="#ff5f56"/>
  <circle cx="62" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="82" cy="38" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="550" y="42" text-anchor="middle" fill="#888" font-size="12">seolens — npx seolens https://github.com</text>

  <!-- Terminal content -->
  <g fill="#d4d4d4">

    <!-- Command line -->
    <text x="40" y="90"><tspan fill="#27c93f">❯</tspan> <tspan fill="#d4d4d4">npx seolens https://github.com</tspan></text>

    <!-- Header -->
    <text x="40" y="128" font-weight="bold" fill="#4ec9b0">  Seolens</text>
    <text x="120" y="128" fill="#888">— SEO audit</text>
    <text x="40" y="146" fill="#444">  ────────────────────────────────────────────────────────────</text>

    <!-- Score block -->
    <text x="40" y="170"><tspan font-weight="bold" fill="#d4d4d4">  URL:    </tspan><tspan fill="#d4d4d4">https://github.com/</tspan></text>
    <text x="40" y="190"><tspan font-weight="bold" fill="#d4d4d4">  Score:  </tspan><tspan font-weight="bold" fill="#4ade80">90/100</tspan> <tspan fill="#888">(A — Excellent)</tspan></text>
    <text x="40" y="210"><tspan font-weight="bold" fill="#d4d4d4">  Stats:  </tspan><tspan fill="#4ade80">20 passed</tspan><tspan fill="#888">, </tspan><tspan fill="#ef4444">0 critical</tspan><tspan fill="#888">, </tspan><tspan fill="#fbbf24">5 warning</tspan><tspan fill="#888">, </tspan><tspan fill="#60a5fa">2 info</tspan></text>

    <!-- Issues found section -->
    <text x="40" y="252" font-weight="bold" fill="#d4d4d4">  Issues found:</text>

    <!-- Meta Tags category -->
    <text x="40" y="288" font-weight="bold" fill="#d4d4d4" text-decoration="underline">  Meta Tags</text>

    <text x="40" y="312"><tspan fill="#fbbf24">  ⚠</tspan> <tspan font-weight="bold" fill="#d4d4d4">Title length is 30-60 characters</tspan></text>
    <text x="40" y="330" fill="#888">     Title is 61 chars — likely truncated in SERPs.</text>
    <text x="40" y="348" fill="#4ec9b0">     → Tighten the title to 60 characters or fewer.</text>

    <text x="40" y="378"><tspan fill="#fbbf24">  ⚠</tspan> <tspan font-weight="bold" fill="#d4d4d4">Meta description is 120-160 characters</tspan></text>
    <text x="40" y="396" fill="#888">     Description is 186 chars — likely truncated in SERPs.</text>
    <text x="40" y="414" fill="#4ec9b0">     → Tighten the description to 160 characters or fewer.</text>

    <!-- Headings category -->
    <text x="40" y="450" font-weight="bold" fill="#d4d4d4" text-decoration="underline">  Headings</text>

    <text x="40" y="474"><tspan fill="#fbbf24">  ⚠</tspan> <tspan font-weight="bold" fill="#d4d4d4">Single H1 per page</tspan></text>
    <text x="40" y="492" fill="#888">     Found 4 &lt;h1&gt; tags. Best practice is exactly one.</text>
    <text x="40" y="510" fill="#4ec9b0">     → Demote secondary &lt;h1&gt; tags to &lt;h2&gt; to keep a single page topic.</text>

    <!-- Technical category -->
    <text x="40" y="546" font-weight="bold" fill="#d4d4d4" text-decoration="underline">  Technical</text>

    <text x="40" y="570"><tspan fill="#fbbf24">  ⚠</tspan> <tspan font-weight="bold" fill="#d4d4d4">sitemap.xml is reachable</tspan></text>
    <text x="40" y="588" fill="#888">     sitemap.xml not found at https://github.com/sitemap.xml (status 406).</text>
    <text x="40" y="606" fill="#4ec9b0">     → Add a /sitemap.xml file listing all your indexable pages.</text>

    <!-- Structured Data category -->
    <text x="40" y="642" font-weight="bold" fill="#d4d4d4" text-decoration="underline">  Structured Data</text>

    <text x="40" y="666"><tspan fill="#fbbf24">  ⚠</tspan> <tspan font-weight="bold" fill="#d4d4d4">JSON-LD structured data present</tspan></text>
    <text x="40" y="684" fill="#888">     No JSON-LD structured data found.</text>
    <text x="40" y="702" fill="#4ec9b0">     → Add Schema.org JSON-LD to enable rich results in Google.</text>

    <!-- Divider -->
    <text x="40" y="744" fill="#444">  ────────────────────────────────────────────────────────────</text>

    <!-- Passed line -->
    <text x="40" y="772" fill="#888">  Passed (20): <tspan fill="#4ade80">✔ Title tag</tspan>, <tspan fill="#4ade80">✔ Meta description</tspan>, <tspan fill="#4ade80">✔ Viewport</tspan>,</text>
    <text x="40" y="790" fill="#888">  <tspan fill="#4ade80">✔ Charset</tspan>, <tspan fill="#4ade80">✔ Lang attr</tspan>, <tspan fill="#4ade80">✔ H1 present</tspan>, <tspan fill="#4ade80">✔ Heading hierarchy</tspan>, <tspan fill="#4ade80">✔ Alt text</tspan>,</text>
    <text x="40" y="808" fill="#888">  <tspan fill="#4ade80">✔ Internal links</tspan>, <tspan fill="#4ade80">✔ Anchor quality</tspan>, <tspan fill="#4ade80">✔ HTTPS</tspan>, <tspan fill="#4ade80">✔ Canonical</tspan>, <tspan fill="#4ade80">✔ 200 OK</tspan>,</text>
    <text x="40" y="826" fill="#888">  <tspan fill="#4ade80">✔ Response &lt; 1.5s</tspan>, <tspan fill="#4ade80">✔ robots.txt</tspan>, <tspan fill="#4ade80">✔ og:title</tspan>, <tspan fill="#4ade80">✔ og:description</tspan>,</text>
    <text x="40" y="844" fill="#888">  <tspan fill="#4ade80">✔ og:image</tspan>, <tspan fill="#4ade80">✔ Twitter card</tspan></text>

    <!-- Bottom divider -->
    <text x="40" y="882" fill="#444">  ────────────────────────────────────────────────────────────</text>

    <!-- Pro upsell -->
    <text x="40" y="910" fill="#888">  Want full-site crawl, Core Web Vitals, AI fix suggestions, PDF reports?</text>
    <text x="40" y="930"><tspan fill="#888">  → </tspan><tspan fill="#4ec9b0" font-weight="bold">Seolens Pro</tspan><tspan fill="#888">: github.com/bluegalaxydev/seolens-pro</tspan></text>

    <!-- Cursor -->
    <text x="40" y="970"><tspan fill="#27c93f">❯</tspan> <tspan fill="#d4d4d4">_</tspan></text>
  </g>
</svg>
